<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Authenticating...</title>
<style>
  body { margin: 0; background: #0a0c18; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
  .box { text-align: center; color: white; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,255,204,0.2); border-top-color: #00ffcc; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: rgba(255,255,255,0.5); font-size: 14px; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>กำลังเชื่อมต่อ TikTok...</p>
</div>
<script>
  // Extract code and state from URL params
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const state = params.get('state');
  const error = params.get('error');

  if (code) {
    // Redirect back to the Android app via deep link
    const deepLink = 'nexuscore://tiktok-auth?code=' + encodeURIComponent(code) + (state ? '&state=' + encodeURIComponent(state) : '');
    window.location.href = deepLink;
    // Fallback message after 3s if app didn't open
    setTimeout(function() {
      document.querySelector('p').textContent = 'กรุณาเปิดแอป Nexus Core แล้วลองใหม่';
    }, 3000);
  } else if (error) {
    document.querySelector('p').textContent = 'Login ไม่สำเร็จ: ' + error;
  } else {
    document.querySelector('p').textContent = 'ไม่พบ authorization code';
  }
</script>
</body>
</html>
